description: >-
  Ellis Coffee Company is a Philadelphia-based wholesale coffee roaster
  founded in 1854 and now in its fourth generation of family ownership.
  Ellis supplies coffee, tea, hot chocolate, brewing equipment, and POS
  materials to restaurants, hotels, resorts, office coffee service (OCS)
  programs, convenience stores, universities, distributors, and vending
  operators. Customers place and manage orders through deliver.elliscoffee.com
  and request brewing equipment service through the OnUpkeep portal. Ellis
  Coffee Company does not publish a public developer API, OpenAPI definition,
  webhook program, SDK, or status page.
